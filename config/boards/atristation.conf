# Amlogic S905X3 quad core 4GB RAM SoC eMMC GBE USB3 SPI
BOARD_NAME="AtriStation"
BOARD_VENDOR="leftymods"
BOARDFAMILY="meson-sm1"
BOARD_MAINTAINER="leftymods"
INTRODUCED="2025"
VENDOR="AtriOS"
VENDORURL="https://github.com/leftymods/CoreOS"
VENDORSUPPORT="https://github.com/leftymods/CoreOS"
VENDORDOCS="https://github.com/leftymods/CoreOS"
VENDORBUGS="https://github.com/leftymods/CoreOS"
MAINTAINERMAIL="leftymods@users.noreply.github.com"
BOOTCONFIG="atristation_defconfig"
KERNEL_TARGET="current"
BOOT_FDT_FILE="amlogic/meson-sm1-atristation.dtb"
MODULES_BLACKLIST="simpledrm rtw88_8822cs" # SimpleDRM conflicts with Panfrost; rtw88 in-tree conflicts with vendor RTL8822CS SDIO driver
FULL_DESKTOP="yes"
SERIALCON="ttyAML0"
BOOT_LOGO="desktop"
IMAGE_VERSION=""
RELEASE_ALIAS="Nebula"

# WiFi/Bluetooth packages for RTL8822CS
PACKAGE_LIST_BOARD="bluez bluetooth rfkill wpasupplicant iwd wireless-tools network-manager i2c-tools"

# Enable TAS5825M audio amplifier
KERNEL_CONFIGURE_OPTS+="custom_kernel_config__enable_tas5825m"
# Enable rtw88 debugfs for RTL8822CS diagnostics
KERNEL_CONFIGURE_OPTS+="custom_kernel_config__enable_rtw88_debugfs"

# Bluetooth: serdev driver (hci_h5 + btrealtek) handles firmware loading automatically
# Kernel node in DTS: compatible = "realtek,rtl8822cs-bt" with enable-gpios

# Userspace rotary encoder polling (GPIOA_0 + GPIOAO_10, no IRQ support)
enable_extension rotary-poll
ROTARY_GPIO_A="periphs-banks 49"
ROTARY_GPIO_B="aobus-banks 10"

# Audio subsystem init (UCM configs, sound card wait)
enable_extension atrisound
