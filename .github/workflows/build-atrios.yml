name: "Build AtriOS"

on:
  workflow_dispatch:
    inputs:
      board:
        description: "Board to build"
        required: true
        default: "odroidc4"
      branch:
        description: "Kernel branch"
        required: true
        default: "current"
      release:
        description: "Userspace release"
        required: true
        default: "noble"
      target:
        description: "Build target (image or kernel)"
        required: true
        default: "image"
      ui:
        description: "UI variant (minimal/server/xfce)"
        required: true
        default: "minimal"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout AtriOS"
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: "Build"
        uses: ./
        with:
          atrios_token: ${{ secrets.GITHUB_TOKEN }}
          atrios_board: ${{ inputs.board }}
          atrios_kernel_branch: ${{ inputs.branch }}
          atrios_release: ${{ inputs.release }}
          atrios_target: ${{ inputs.target }}
          atrios_ui: ${{ inputs.ui }}
          atrios_runner_clean: "yes"
